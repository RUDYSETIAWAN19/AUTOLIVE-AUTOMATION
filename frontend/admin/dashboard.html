<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOLIVE - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #1f2428;
            border-right: 1px solid #30363d;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #30363d; }
        .sidebar-header img { width: 50px; height: 50px; margin-bottom: 10px; }
        .sidebar-header h2 { font-size: 18px; letter-spacing: 1px; }
        .sidebar-nav { padding: 20px 0; }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e6edf3;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item:hover { background: #2d333b; }
        .nav-item.active { background: #2ea043; }
        .main-content { margin-left: 260px; padding: 24px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; }
        .logout-btn {
            background: #2d333b;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1f2428;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card h3 { font-size: 13px; color: #7d8590; margin-bottom: 8px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #2ea043; }
        .section {
            background: #1f2428;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .section h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #30363d; }
        th { color: #7d8590; font-weight: 500; font-size: 13px; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-admin { background: #f85149; color: white; }
        .badge-user { background: #2ea043; color: white; }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            border: none;
        }
        .btn-primary { background: #2ea043; color: white; }
        .btn-danger { background: #f85149; color: white; }
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            z-index: 1000;
            display: none;
        }
        .alert-success { background: #2ea043; color: white; }
        .alert-error { background: #f85149; color: white; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img id="sidebarLogo" src="https://via.placeholder.com/50?text=🤖">
            <h2>AUTOLIVE</h2>
            <p style="font-size: 12px; color: #7d8590;">Admin Panel</p>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item" data-page="users"><i class="fas fa-users"></i> Users</div>
            <div class="nav-item" data-page="channels"><i class="fab fa-youtube"></i> Channels</div>
            <div class="nav-item" data-page="workflows"><i class="fas fa-project-diagram"></i> Workflows</div>
            <div class="nav-item" data-page="analytics"><i class="fas fa-chart-line"></i> Analytics</div>
            <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
            <div class="user-info">
                <span id="adminName">Admin</span>
                <img id="adminAvatar" src="https://via.placeholder.com/40">
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div id="dashboardPage">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="section">
                <h2><i class="fas fa-users"></i> Recent Users</h2>
                <table id="usersTable"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Plan</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
        
        <div id="usersPage" style="display: none;">
            <div class="section">
                <h2><i class="fas fa-user-plus"></i> Manage Users</h2>
                <button class="btn btn-primary" onclick="showAddUserModal()"><i class="fas fa-plus"></i> Add User</button>
                <table style="margin-top: 20px;"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Plan</th><th>Actions</th></tr></thead><tbody id="allUsersTable"></tbody></table>
            </div>
        </div>
        
        <div id="channelsPage" style="display: none;">
            <div class="section">
                <h2><i class="fab fa-youtube"></i> Connected Channels</h2>
                <table><thead><tr><th>Platform</th><th>Channel Name</th><th>Owner</th><th>Status</th></tr></thead><tbody id="channelsTable"></tbody></table>
            </div>
        </div>
        
        <div id="workflowsPage" style="display: none;">
            <div class="section">
                <h2><i class="fas fa-project-diagram"></i> Workflows</h2>
                <button class="btn btn-primary" onclick="showCreateWorkflowModal()"><i class="fas fa-plus"></i> Create Workflow</button>
                <div id="workflowsList" style="margin-top: 20px;"></div>
            </div>
        </div>
        
        <div id="analyticsPage" style="display: none;">
            <div class="section">
                <h2><i class="fas fa-chart-line"></i> Platform Analytics</h2>
                <div class="stats-grid" id="analyticsStats"></div>
            </div>
        </div>
        
        <div id="settingsPage" style="display: none;">
            <div class="section">
                <h2><i class="fas fa-cog"></i> System Settings</h2>
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div><label>Site Logo URL</label><input type="text" id="siteLogoInput" style="width: 100%; margin-top: 8px;"><button class="btn btn-primary" onclick="updateSiteLogo()" style="margin-top: 8px;">Update Logo</button></div>
                    <div><label>Default User Plan</label><select id="defaultPlan" style="width: 100%; margin-top: 8px;"><option value="free">Free</option><option value="pro">Pro</option><option value="premium">Premium</option></select></div>
                    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="alert" class="alert"></div>
    
    <script>
        function getApiUrl() {
            if (window.location.hostname.includes('app.github.dev')) {
                const port = '5001';
                const hostname = window.location.hostname.replace('-3000', '');
                return `https://${hostname}-${port}.app.github.dev`;
            }
            return 'http://localhost:5001';
        }
        
        const API_URL = getApiUrl();
        console.log('Admin Dashboard API_URL:', API_URL);
        
        let currentUser = null;
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = '/login.html';
                return false;
            }
            currentUser = JSON.parse(user);
            if (currentUser.role !== 'admin') {
                window.location.href = '/user/dashboard.html';
                return false;
            }
            document.getElementById('adminName').textContent = currentUser.name;
            const savedLogo = localStorage.getItem('siteLogo');
            if (savedLogo) document.getElementById('sidebarLogo').src = savedLogo;
            return true;
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
        }
        
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            const response = await fetch(url, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers }
            });
            if (response.status === 401) logout();
            return response;
        }
        
        async function loadDashboard() {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/admin/stats`);
                const data = await response.json();
                if (response.ok && data.stats) {
                    const stats = data.stats;
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card"><h3>Total Users</h3><div class="stat-number">${stats.totalUsers}</div></div>
                        <div class="stat-card"><h3>Active Sessions</h3><div class="stat-number">${stats.activeSessions}</div></div>
                        <div class="stat-card"><h3>API Calls Today</h3><div class="stat-number">${stats.apiCallsToday}</div></div>
                        <div class="stat-card"><h3>Total Videos</h3><div class="stat-number">${stats.totalVideos}</div></div>
                        <div class="stat-card"><h3>Workflows</h3><div class="stat-number">${stats.totalWorkflows}</div></div>
                        <div class="stat-card"><h3>Storage Used</h3><div class="stat-number">${stats.storageUsed}</div></div>
                    `;
                }
                
                const usersResponse = await fetchWithAuth(`${API_URL}/api/users`);
                const usersData = await usersResponse.json();
                if (usersResponse.ok && usersData.users) {
                    document.querySelector('#usersTable tbody').innerHTML = usersData.users.map(user => `
                        <tr><td>${user.name}</td><td>${user.email}</td><td><span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">${user.role}</span></td><td>${user.plan}</td></tr>
                    `).join('');
                    document.getElementById('allUsersTable').innerHTML = usersData.users.map(user => `
                        <tr><td>${user.name}</td><td>${user.email}</td><td><span class="badge ${user.role === 'admin' ? 'badge-admin' : 'badge-user'}">${user.role}</span></td><td>${user.plan}</td><td><button class="btn btn-danger" onclick="deleteUser('${user.id}')">Delete</button></td></tr>
                    `).join('');
                }
                
                document.getElementById('channelsTable').innerHTML = `
                    <tr><td>YouTube</td><td>AutoLive Channel</td><td>Rudy Setiawan</td><td><span class="badge badge-admin">Active</span></td></tr>
                    <tr><td>TikTok</td><td>@autolive</td><td>Marga Jaya</td><td><span class="badge badge-admin">Active</span></td></tr>
                `;
                
                document.getElementById('workflowsList').innerHTML = `
                    <div style="background: #2d333b; padding: 16px; border-radius: 8px; margin-bottom: 12px;"><strong>Viral Content Workflow</strong><br><span style="font-size: 12px; color: #7d8590;">Status: Active | Runs: Daily</span></div>
                    <div style="background: #2d333b; padding: 16px; border-radius: 8px;"><strong>Auto Upload Workflow</strong><br><span style="font-size: 12px; color: #7d8590;">Status: Active | Runs: Hourly</span></div>
                `;
                
                document.getElementById('analyticsStats').innerHTML = `
                    <div class="stat-card"><h3>Total Views</h3><div class="stat-number">2.5M</div></div>
                    <div class="stat-card"><h3>Total Likes</h3><div class="stat-number">156K</div></div>
                    <div class="stat-card"><h3>Engagement Rate</h3><div class="stat-number">4.2%</div></div>
                `;
                
                document.getElementById('siteLogoInput').value = localStorage.getItem('siteLogo') || '';
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showAlert('Error loading dashboard data', 'error');
            }
        }
        
        function updateSiteLogo() {
            const url = document.getElementById('siteLogoInput').value;
            if (url) {
                localStorage.setItem('siteLogo', url);
                document.getElementById('sidebarLogo').src = url;
                showAlert('Logo updated successfully!', 'success');
            }
        }
        
        function saveSettings() {
            localStorage.setItem('defaultPlan', document.getElementById('defaultPlan').value);
            showAlert('Settings saved!', 'success');
        }
        
        function addUser() { showAlert('Add user feature coming soon', 'success'); }
        function deleteUser(id) { showAlert('Delete user feature coming soon', 'success'); }
        function showAddUserModal() { showAlert('Add user modal coming soon', 'success'); }
        function showCreateWorkflowModal() { showAlert('Create workflow modal coming soon', 'success'); }
        
        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('[id$="Page"]').forEach(pageDiv => pageDiv.style.display = 'none');
                document.getElementById(`${page}Page`).style.display = 'block';
                document.getElementById('pageTitle').textContent = page.charAt(0).toUpperCase() + page.slice(1);
            });
        });
        
        if (checkAuth()) loadDashboard();
    </script>
</body>
</html>
