<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOLIVE - Authorization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1f2428;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #30363d;
            text-align: center;
        }
        .social-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2ea043, #1f6feb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        .auth-card h2 {
            color: #e6edf3;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .auth-card p {
            color: #7d8590;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e6edf3;
            font-size: 13px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0a0c10;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            font-family: monospace;
        }
        .api-info {
            background: #0a0c10;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin: 16px 0;
            text-align: left;
        }
        .api-info p {
            font-size: 12px;
            color: #7d8590;
            margin: 5px 0;
        }
        .api-info code {
            color: #2ea043;
            background: #1f2428;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #2ea043;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            font-size: 14px;
        }
        .btn-primary:hover {
            background: #3fb950;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #2d333b;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            cursor: pointer;
            margin-top: 12px;
            font-size: 14px;
        }
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
        .alert.error {
            background: rgba(248,81,73,0.1);
            border: 1px solid #f85149;
            color: #f85149;
        }
        .alert.success {
            background: rgba(46,160,67,0.1);
            border: 1px solid #2ea043;
            color: #2ea043;
        }
        .alert.info {
            background: rgba(88,166,255,0.1);
            border: 1px solid #58a6ff;
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="social-icon" id="socialIcon">🔐</div>
        <h2 id="userName">Loading...</h2>
        <p id="userEmail">Loading...</p>
        
        <div id="alert" class="alert"></div>
        
        <div class="api-info">
            <p>🔑 <strong>How to get your API Key:</strong></p>
            <p>1. Go to Settings → API Keys</p>
            <p>2. Click "Generate New Key"</p>
            <p>3. Copy and paste your key here</p>
            <p>📌 <code>Example: AL-xxxx-xxxx-xxxx-xxxx</code></p>
        </div>
        
        <form id="authForm">
            <div class="form-group">
                <label>🔑 API KEY</label>
                <input type="password" id="apiKey" placeholder="Enter your API key (e.g., AL-xxxx-xxxx-xxxx)" required>
            </div>
            <button type="submit" class="btn-primary">VERIFY & CONTINUE</button>
            <button type="button" class="btn-secondary" onclick="backToLogin()">← BACK TO LOGIN</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider') || 'Unknown';
        const socialData = JSON.parse(localStorage.getItem('socialLoginData') || '{}');
        
        const icons = { 
            google: '🔵', 
            youtube: '📺', 
            facebook: '🔷', 
            instagram: '📸', 
            tiktok: '🎵' 
        };
        
        document.getElementById('userName').textContent = socialData.name || `${provider} User`;
        document.getElementById('userEmail').textContent = socialData.email || 'No email provided';
        document.getElementById('socialIcon').textContent = icons[provider.toLowerCase()] || '🔐';
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 5000);
        }
        
        async function verifyApiKey(apiKey) {
            if (!apiKey || apiKey.length < 10) {
                showAlert('Please enter a valid API key (minimum 10 characters)', 'error');
                return false;
            }
            
            try {
                const response = await fetch('http://localhost:5001/api/auth/verify-api-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: socialData.email,
                        provider: provider,
                        apiKey: apiKey
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('apiKey', apiKey);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    showAlert('✅ API key verified! Redirecting to dashboard...', 'success');
                    setTimeout(() => window.location.href = '/user/dashboard.html', 1500);
                    return true;
                } else {
                    showAlert(data.message || '❌ Invalid API key. Please check and try again.', 'error');
                    return false;
                }
            } catch (error) {
                showAlert('⚠️ Network error. Make sure backend is running on port 5001', 'error');
                return false;
            }
        }
        
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const apiKey = document.getElementById('apiKey').value;
            const btn = e.target.querySelector('.btn-primary');
            btn.disabled = true;
            btn.innerHTML = 'VERIFYING...';
            await verifyApiKey(apiKey);
            btn.disabled = false;
            btn.innerHTML = 'VERIFY & CONTINUE';
        });
        
        function backToLogin() {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
