<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOLIVE - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .lang-btn {
            background: #1f2428;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 5px;
            background: #1f2428;
            border: 1px solid #30363d;
            border-radius: 6px;
            min-width: 160px;
            display: none;
        }
        .lang-dropdown.show { display: block; }
        .lang-option {
            display: block;
            padding: 8px 12px;
            color: #e6edf3;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }
        .lang-option:hover { background: #2d333b; }
        .login-card {
            background: #1f2428;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #30363d;
        }
        .logo { text-align: center; margin-bottom: 32px; cursor: pointer; }
        .logo img { max-width: 80px; margin-bottom: 12px; }
        .logo h1 { font-size: 32px; font-weight: 800; letter-spacing: 2px; color: #e6edf3; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: #e6edf3; }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0c10;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #2ea043;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .auth-links a { color: #2ea043; text-decoration: none; font-size: 13px; }
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #30363d;
        }
        .divider span {
            background: #1f2428;
            padding: 0 12px;
            color: #7d8590;
            font-size: 12px;
            position: relative;
        }
        .social-login {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #2d333b;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-social img { width: 20px; height: 20px; }
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
        .alert.error { background: rgba(248,81,73,0.1); border: 1px solid #f85149; color: #f85149; }
        .alert.success { background: rgba(46,160,67,0.1); border: 1px solid #2ea043; color: #2ea043; }
        @media (max-width: 480px) {
            .login-card { padding: 24px; margin: 16px; }
            .social-login { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="lang-selector">
        <button class="lang-btn" id="langBtn">🌐 <span id="currentLang">English</span> ▼</button>
        <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option" data-lang="en">English</div>
            <div class="lang-option" data-lang="id">Bahasa Indonesia</div>
            <div class="lang-option" data-lang="zh">中文</div>
        </div>
    </div>
    <div class="login-card">
        <div class="logo" id="logoBtn">
            <img id="logoImage" src="https://via.placeholder.com/80x80?text=🤖" alt="AUTOLIVE">
            <h1>AUTOLIVE</h1>
        </div>
        <h2 id="title">SIGN IN TO AUTOLIVE</h2>
        <div id="alert" class="alert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label id="emailLabel">EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="username@example.com" required>
            </div>
            <div class="form-group">
                <label id="passwordLabel">PASSWORD</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">SIGN IN</button>
        </form>
        <div class="auth-links">
            <a href="#" id="createAccount">CREATE ACCOUNT</a>
            <a href="#" id="forgotPassword">FORGOT PASSWORD?</a>
        </div>
        <div class="divider"><span id="orText">OR</span></div>
        <div class="social-login" id="socialButtons">
            <button class="btn-social" data-provider="google"><img src="https://www.google.com/s2/favicons?domain=google.com"> GOOGLE</button>
            <button class="btn-social" data-provider="youtube"><img src="https://www.google.com/s2/favicons?domain=youtube.com"> YOUTUBE</button>
            <button class="btn-social" data-provider="facebook"><img src="https://www.google.com/s2/favicons?domain=facebook.com"> FACEBOOK</button>
            <button class="btn-social" data-provider="instagram"><img src="https://www.google.com/s2/favicons?domain=instagram.com"> INSTAGRAM</button>
            <button class="btn-social" data-provider="tiktok"><img src="https://www.google.com/s2/favicons?domain=tiktok.com"> TIKTOK</button>
        </div>
    </div>

    <script>
        // Dynamic API URL for GitHub Codespaces
        function getApiUrl() {
            const hostname = window.location.hostname;
            console.log('Current hostname:', hostname);
            
            // For GitHub Codespaces
            if (hostname.includes('app.github.dev')) {
                // Extract codespace name (remove -3000 suffix)
                let codespaceName = hostname;
                if (codespaceName.includes('-3000')) {
                    codespaceName = codespaceName.replace('-3000.app.github.dev', '');
                } else {
                    codespaceName = codespaceName.replace('.app.github.dev', '');
                }
                const apiUrl = `https://${codespaceName}-5001.app.github.dev`;
                console.log('Codespaces API URL:', apiUrl);
                return apiUrl;
            }
            
            // For localhost
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return 'http://localhost:5001';
            }
            
            return `http://${hostname}:5001`;
        }
        
        const API_URL = getApiUrl();
        console.log('✅ API_URL configured:', API_URL);
        
        // Check backend connection
        async function checkBackend() {
            try {
                console.log('Checking backend at:', API_URL);
                const response = await fetch(`${API_URL}/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Backend connected:', data);
                    return true;
                }
            } catch (error) {
                console.error('❌ Backend not reachable:', error);
            }
            return false;
        }
        
        const translations = {
            en: {
                title: 'SIGN IN TO AUTOLIVE',
                email: 'EMAIL ADDRESS',
                password: 'PASSWORD',
                loginBtn: 'SIGN IN',
                or: 'OR',
                createAccount: 'CREATE ACCOUNT',
                forgotPassword: 'FORGOT PASSWORD?',
                loginSuccess: 'Login successful! Redirecting...',
                loginError: 'Invalid email or password',
                socialLogin: { google: 'GOOGLE', youtube: 'YOUTUBE', facebook: 'FACEBOOK', instagram: 'INSTAGRAM', tiktok: 'TIKTOK' }
            },
            id: {
                title: 'MASUK KE AUTOLIVE',
                email: 'ALAMAT EMAIL',
                password: 'KATA SANDI',
                loginBtn: 'MASUK',
                or: 'ATAU',
                createAccount: 'BUAT AKUN',
                forgotPassword: 'LUPA KATA SANDI?',
                loginSuccess: 'Berhasil masuk! Mengalihkan...',
                loginError: 'Email atau kata sandi salah',
                socialLogin: { google: 'GOOGLE', youtube: 'YOUTUBE', facebook: 'FACEBOOK', instagram: 'INSTAGRAM', tiktok: 'TIKTOK' }
            },
            zh: {
                title: '登录 AUTOLIVE',
                email: '电子邮件地址',
                password: '密码',
                loginBtn: '登录',
                or: '或',
                createAccount: '创建帐户',
                forgotPassword: '忘记密码？',
                loginSuccess: '登录成功！正在跳转...',
                loginError: '电子邮件或密码错误',
                socialLogin: { google: '谷歌', youtube: 'YouTube', facebook: '脸书', instagram: 'Instagram', tiktok: '抖音' }
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function updateLanguage() {
            const t = translations[currentLang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('emailLabel').textContent = t.email;
            document.getElementById('passwordLabel').textContent = t.password;
            document.getElementById('loginBtn').innerHTML = t.loginBtn;
            document.getElementById('orText').textContent = t.or;
            document.getElementById('createAccount').textContent = t.createAccount;
            document.getElementById('forgotPassword').textContent = t.forgotPassword;
            
            document.querySelectorAll('.btn-social').forEach(btn => {
                const provider = btn.dataset.provider;
                if (t.socialLogin[provider]) {
                    const img = btn.querySelector('img');
                    btn.innerHTML = '';
                    btn.appendChild(img);
                    btn.appendChild(document.createTextNode(' ' + t.socialLogin[provider]));
                }
            });
            
            const langNames = { en: 'English', id: 'Bahasa Indonesia', zh: '中文' };
            document.getElementById('currentLang').textContent = langNames[currentLang];
        }

        // Language selector
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        langBtn.addEventListener('click', () => langDropdown.classList.toggle('show'));
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', () => {
                currentLang = opt.dataset.lang;
                localStorage.setItem('lang', currentLang);
                updateLanguage();
                langDropdown.classList.remove('show');
            });
        });
        document.addEventListener('click', (e) => {
            if (!langBtn.contains(e.target) && !langDropdown.contains(e.target)) {
                langDropdown.classList.remove('show');
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 4000);
        }

        async function login(email, password) {
            try {
                console.log('Login attempt to:', `${API_URL}/api/auth/login`);
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert(translations[currentLang].loginSuccess, 'success');
                    
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = '/admin/dashboard.html';
                        } else {
                            window.location.href = '/user/dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || translations[currentLang].loginError, 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert(`Cannot connect to server at ${API_URL}. Make sure backend is running on port 5001`, 'error');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = 'LOADING...';
            await login(email, password);
            btn.disabled = false;
            btn.innerHTML = translations[currentLang].loginBtn;
        });

        function handleSocialLogin(provider) {
            showAlert(`Connecting to ${provider}...`, 'success');
            setTimeout(() => {
                const socialUser = {
                    name: `${provider} User`,
                    email: `${provider.toLowerCase()}_user@example.com`,
                    provider: provider
                };
                localStorage.setItem('socialLoginData', JSON.stringify(socialUser));
                window.location.href = `/auth/authorize.html?provider=${provider}`;
            }, 1000);
        }

        document.querySelectorAll('.btn-social').forEach(btn => {
            btn.addEventListener('click', () => handleSocialLogin(btn.dataset.provider));
        });
        
        document.getElementById('createAccount').onclick = () => showAlert('Create account feature coming soon', 'success');
        document.getElementById('forgotPassword').onclick = () => showAlert('Password reset feature coming soon', 'success');

        updateLanguage();

        // Check if already logged in
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        if (token && user) {
            const userData = JSON.parse(user);
            if (userData.role === 'admin') {
                window.location.href = '/admin/dashboard.html';
            } else {
                window.location.href = '/user/dashboard.html';
            }
        }
        
        // Check backend on load
        checkBackend();
    </script>
</body>
</html>
