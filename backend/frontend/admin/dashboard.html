<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · AutoLive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 0;
            margin-bottom: 32px;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo i {
            font-size: 28px;
            color: #2ea043;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logout-btn {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            color: #e6edf3;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #7d8590;
            margin-bottom: 8px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 600;
            color: #2ea043;
        }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }
        
        th {
            color: #7d8590;
            font-weight: 500;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .badge.admin {
            background: #f85149;
            color: white;
        }
        
        .badge.user {
            background: #2ea043;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>AutoLive Admin</h1>
            </div>
            <div class="user-menu">
                <span id="userName">Admin</span>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>
    
    <div class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Sessions</h3>
                <div class="stat-number" id="activeSessions">0</div>
            </div>
            <div class="stat-card">
                <h3>API Calls Today</h3>
                <div class="stat-number" id="apiCalls">0</div>
            </div>
        </div>
        
        <div class="section">
            <h2>Recent Users</h2>
            <table id="usersTable">
                <thead>
                    <tr><th>Name</th><th>Email</th><th>Role</th><th>Plan</th></tr>
                </thead>
                <tbody>
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        
        function getToken() {
            return localStorage.getItem('token');
        }
        
        function getUser() {
            return JSON.parse(localStorage.getItem('user') || '{}');
        }
        
        async function fetchWithAuth(url, options = {}) {
            const token = getToken();
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
                logout();
            }
            
            return response;
        }
        
        async function loadDashboard() {
            const user = getUser();
            document.getElementById('userName').textContent = user.name || 'Admin';
            
            // Load users
            const response = await fetchWithAuth(`${API_URL}/users`);
            const data = await response.json();
            
            if (response.ok && data.users) {
                document.getElementById('totalUsers').textContent = data.users.length;
                
                const tbody = document.querySelector('#usersTable tbody');
                tbody.innerHTML = data.users.slice(0, 5).map(user => `
                    <tr>
                        <td>${user.name || '-'}</td>
                        <td>${user.email}</td>
                        <td><span class="badge ${user.role}">${user.role}</span></td>
                        <td>${user.plan || 'free'}</td>
                    </tr>
                `).join('');
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
        
        // Check auth
        const token = getToken();
        const user = getUser();
        
        if (!token || user.role !== 'admin') {
            window.location.href = '/login.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
